networks:
  proxy:
    external: true
x-common-settings: &common-settings
  logging:
    driver: local
    options:
      compress: "true"
      max-file: "3"
      max-size: "10m"
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  stdin_open: false
  tty: false
services:
  calibre:
    <<: *common-settings
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: calibre
    environment:
      PGID: ${gid:-1000}
      PUID: ${uid:-1000}
      TZ: ${timezone:-UTC}
    image: lscr.io/linuxserver/calibre-web:${calibre_web_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://cb.${domain:?}
      homepage.icon: sh-calibre.svg
      homepage.name: Calibre
      kuma.__docker:
      release_notes: "https://docs.linuxserver.io/images/docker-calibre-web/#versions"
      traefik.enable: "true"
      traefik.http.routers.calibre.entryPoints: "https"
      traefik.http.routers.calibre.middlewares: "allowedIPs@file"
      traefik.http.routers.calibre.rule: "Host(`cb.${domain:?}`)"
      traefik.http.services.calibre.loadbalancer.server.url: "http://calibre:8083"
    networks:
      proxy: null
    volumes:
      - ${data:-.}/calibre:/config
      - ${media}/Books:/books
  copyparty:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: copyparty
    environment:
      LD_PRELOAD: /usr/lib/libmimalloc-secure.so.2
    healthcheck:
      # hide it from logs with "/._" so it matches the default --lf-url filter
      test: ["CMD-SHELL", "wget --spider -q 127.0.0.1:3923/?reset=/._"]
      interval: 1m
      timeout: 2s
      retries: 5
      start_period: 15s
    image: copyparty/iv:${copyparty_version:-latest}
    labels:
      homepage.group: Files & Sharing
      homepage.href: https://c.${domain:?}
      homepage.icon: sh-copyparty.svg
      homepage.name: Copyparty
      kuma.__docker:
      release_notes: "https://github.com/9001/copyparty/releases"
      traefik.enable: "true"
      traefik.http.routers.copyparty.entryPoints: "https"
      traefik.http.routers.copyparty.middlewares: "localonly@file"
      traefik.http.routers.copyparty.rule: "Host(`c.${domain:?}`)"
      traefik.http.services.copyparty.loadbalancer.server.url: "http://copyparty:3923"
    networks:
      proxy:
    stop_grace_period: 15s # thumbnailer is allowed to continue finishing up for 10s after the shutdown signal
    user: ${uid:-1000}:${gid:-1000}
    volumes:
      - ${data:-.}/copyparty/conf:/cfg
      - ${data:-.}/copyparty/files:/w
  jellyfin:
    <<: *common-settings
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: jellyfin
    devices:
      - /dev/dri
    environment:
      JELLYFIN_PublishedServerUrl: jf.${domain:?}
      PGID: ${gid:-1000}
      PUID: ${uid:-1000}
      TZ: ${timezone:-UTC}
    image: lscr.io/linuxserver/jellyfin:${jellyfin_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://jf.${domain:?}
      homepage.icon: sh-jellyfin.svg
      homepage.name: Jellyfin
      kuma.__docker:
      release_notes: "https://docs.linuxserver.io/images/docker-jellyfin/#versions"
      traefik.enable: "true"
      traefik.http.routers.jellyfin.entryPoints: "https"
      traefik.http.routers.jellyfin.middlewares: "allowedIPs@file"
      traefik.http.routers.jellyfin.rule: "Host(`jf.${domain:?}`)"
      traefik.http.services.jellyfin.loadbalancer.server.url: "http://jellyfin:8096"
    networks:
      proxy: null
    ports:
      - "7359:7359/udp" # Client Discovery
    volumes:
      - ${data:-.}/jellyfin:/config:rw
      - ${media}/TV:/data/tvshows:rw
      - ${media}/Movies:/data/movies:rw
      - ${media}/Music:/data/music:rw
  navidrome:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: navidrome
    environment:
      ND_ENABLEINSIGHTSCOLLECTOR: ${navi_analytics:-true}
      ND_ENABLEUSEREDITING: false
      ND_REVERSEPROXYWHITELIST: 0.0.0.0/0
    image: ghcr.io/navidrome/navidrome:${navidrome_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://nav.${domain:?}
      homepage.icon: sh-navidrome.svg
      homepage.name: Navidrome
      kuma.__docker:
      release_notes: "https://github.com/navidrome/navidrome/releases"
      traefik.enable: "true"
      traefik.http.routers.navidrome.entryPoints: "https"
      traefik.http.routers.navidrome.middlewares: "allowedIPs@file, tinyauth@file"
      traefik.http.routers.navidrome.priority: 30
      traefik.http.routers.navidrome.rule: "Host(`nav.${domain:?}`)"
      traefik.http.services.navidrome.loadbalancer.server.url: "http://navidrome:4533"
      # App specific auth with basic-auth
      traefik.http.routers.navidrome-subsonic.entrypoints: "https"
      traefik.http.routers.navidrome-subsonic.middlewares: "allowedIPs@file"
      traefik.http.routers.navidrome-subsonic.priority: 50
      traefik.http.routers.navidrome-subsonic.rule: Host(`nav.${domain:?}`) && PathPrefix(`/rest/`) && !Query(`c`, `NavidromeUI`)
    networks:
      proxy: null
    user: ${uid:-1000}:${gid:-1000}
    volumes:
      - ${data:-.}/navidrome:/data:rw
      - ${media}/Music:/music:ro

  seerr:
    <<: *common-settings
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: seerr
    environment:
      LOG_LEVEL: ${log_level:-warn}
      TZ: ${timezone:-UTC}
    depends_on:
      - jellyfin
    healthcheck:
      interval: 15s
      retries: 3
      start_period: 20s
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      timeout: 3s
    image: ghcr.io/seerr-team/seerr:${seerr_version:-latest}
    init: true
    labels:
      homepage.group: Arr Stack
      homepage.href: https://se.${domain:?}
      homepage.icon: sh-seerr.svg
      homepage.name: Seerr
      kuma.__docker:
      release_notes: "https://github.com/seerr-team/seerr/releases"
      traefik.enable: "true"
      traefik.http.routers.seerr.entryPoints: "https"
      traefik.http.routers.seerr.middlewares: "allowedIPs@file,tinyauth@file"
      traefik.http.routers.seerr.rule: "Host(`se.${domain:?}`)"
      traefik.http.services.seerr.loadbalancer.server.url: "http://seerr:5055"
    networks:
      proxy: null
    volumes:
      - ${data:-.}/seerr:/app/config/:rw
networks:
  freshrss:
  proxy:
    external: true
services:
  calibre:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: calibre
    environment:
      PGID: ${gid:-1000}
      PUID: ${uid:-1000}
      TZ: ${timezone:-UTC}
    image: lscr.io/linuxserver/calibre-web:${calibre_web_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://cb.${domain:?}
      homepage.icon: sh-calibre.svg
      homepage.name: Calibre
      kuma.__docker:
      release_notes: "https://docs.linuxserver.io/images/docker-calibre-web/#versions"
      traefik.enable: "true"
      traefik.http.routers.calibre.entryPoints: "https"
      traefik.http.routers.calibre.middlewares: "allowedIPs@file"
      traefik.http.routers.calibre.rule: "Host(`cb.${domain:?}`)"
      traefik.http.services.calibre.loadbalancer.server.url: "http://calibre:8083"
    networks:
      proxy: null
    volumes:
      - ${data:-.}/calibre:/config
      - ${media}/Books:/books
  freshrss:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: freshrss
    depends_on:
      - freshrss_postgres
    environment:
      CRON_MIN: "1,31"
      LISTEN: 0.0.0.0:80
      OIDC_CLIENT_ID: ${client_id:?}
      OIDC_CLIENT_SECRET: ${client_secret:?}
      OIDC_ENABLED: 1
      OIDC_PROVIDER_METADATA_URL: https://id.${domain:?}/.well-known/openid-configuration
      OIDC_REMOTE_USER_CLAIM: preferred_username
      OIDC_SCOPES: openid email profile
      OIDC_X_FORWARDED_HEADERS: X-Forwarded-Proto X-Forwarded-Host
      TRUSTED_PROXY: 0
      TZ: ${timezone:-UTC}
    image: freshrss/freshrss:${freshrss_version:-latest}
    labels:
      homepage.group: Personal
      homepage.href: https://rss.${domain:?}
      homepage.icon: sh-freshrss.svg
      homepage.name: Freshrss
      homepage.widget.password: ${freshrss_user_password:-.unset}
      homepage.widget.type: freshrss
      homepage.widget.url: http://freshrss:80
      homepage.widget.username: ${freshrss_user_name:-.unset}
      kuma.__docker:
      release_notes: "https://github.com/linuxserver/docker-freshrss/releases"
      traefik.enable: "true"
      traefik.http.routers.freshrss.entryPoints: "https"
      traefik.http.routers.freshrss.middlewares: "allowedIPs@file"
      traefik.http.routers.freshrss.rule: "Host(`rss.${domain:?}`)"
      traefik.http.services.freshrss.loadbalancer.server.url: "http://freshrss:80"
    networks:
      freshrss:
      proxy:
    volumes:
      - ${data:-.}/rss/data:/var/www/FreshRSS/data
      - ${data:-.}/rss/extensions:/var/www/FreshRSS/extensions
  freshrss_postgres:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    container_name: freshrss_postgres
    environment:
      POSTGRES_DB: ${db_name:-freshrss}
      POSTGRES_PASSWORD: ${db_pass:?}
      POSTGRES_USER: ${db_user:-freshrss}
    image: postgres:${postgres_version:-16}
    labels:
      kuma.__docker:
      release_notes: "https://www.postgresql.org/docs/release/"
    networks:
      freshrss:
    volumes:
      - ${data:-.}/rss/db:/var/lib/postgresql/data
  jellyfin:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: jellyfin
    devices:
      - /dev/dri
    environment:
      JELLYFIN_PublishedServerUrl: jf.${domain:?}
      PGID: ${gid:-1000}
      PUID: ${uid:-1000}
      TZ: ${timezone:-UTC}
    image: lscr.io/linuxserver/jellyfin:${jellyfin_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://jf.${domain:?}
      homepage.icon: sh-jellyfin.svg
      homepage.name: Jellyfin
      kuma.__docker:
      release_notes: "https://docs.linuxserver.io/images/docker-jellyfin/#versions"
      traefik.enable: "true"
      traefik.http.routers.jellyfin.entryPoints: "https"
      traefik.http.routers.jellyfin.middlewares: "allowedIPs@file"
      traefik.http.routers.jellyfin.rule: "Host(`jf.${domain:?}`)"
      traefik.http.services.jellyfin.loadbalancer.server.url: "http://jellyfin:8096"
    networks:
      proxy: null
    ports:
      - "7359:7359/udp" # Client Discovery
    volumes:
      - ${data:-.}/jellyfin:/config:rw
      - ${media}/TV:/data/tvshows:rw
      - ${media}/Movies:/data/movies:rw
      - ${media}/Music:/data/music:rw
  navidrome:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    container_name: navidrome
    environment:
      ND_ENABLEINSIGHTSCOLLECTOR: ${navi_analytics:-true}
      ND_ENABLEUSEREDITING: false
      ND_REVERSEPROXYWHITELIST: 0.0.0.0/0
    image: ghcr.io/navidrome/navidrome:${navidrome_version:-latest}
    labels:
      homepage.group: Media Consumption
      homepage.href: https://nav.${domain:?}
      homepage.icon: sh-navidrome.svg
      homepage.name: Navidrome
      kuma.__docker:
      release_notes: "https://github.com/navidrome/navidrome/releases"
      traefik.enable: "true"
      traefik.http.routers.navidrome.entryPoints: "https"
      traefik.http.routers.navidrome.middlewares: "allowedIPs@file, tinyauth@file"
      traefik.http.routers.navidrome.priority: 30
      traefik.http.routers.navidrome.rule: "Host(`nav.${domain:?}`)"
      traefik.http.services.navidrome.loadbalancer.server.url: "http://navidrome:4533"
      # App specific auth with basic-auth
      traefik.http.routers.navidrome-subsonic.entrypoints: "https"
      traefik.http.routers.navidrome-subsonic.middlewares: "allowedIPs@file"
      traefik.http.routers.navidrome-subsonic.priority: 50
      traefik.http.routers.navidrome-subsonic.rule: Host(`nav.${domain:?}`) && PathPrefix(`/rest/`) && !Query(`c`, `NavidromeUI`)
    networks:
      proxy: null
    user: ${uid:-1000}:${gid:-1000}
    volumes:
      - ${data:-.}/navidrome:/data:rw
      - ${media}/Music:/music:ro
  seerr:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: seerr
    environment:
      LOG_LEVEL: ${log_level:-warn}
      TZ: ${timezone:-UTC}
    depends_on:
      - jellyfin
    healthcheck:
      interval: 15s
      retries: 3
      start_period: 20s
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      timeout: 3s
    image: ghcr.io/seerr-team/seerr:${seerr_version:-latest}
    init: true
    labels:
      homepage.group: Arr Stack
      homepage.href: https://se.${domain:?}
      homepage.icon: sh-seerr.svg
      homepage.name: Seerr
      kuma.__docker:
      release_notes: "https://github.com/seerr-team/seerr/releases"
      traefik.enable: "true"
      traefik.http.routers.seerr.entryPoints: "https"
      traefik.http.routers.seerr.middlewares: "allowedIPs@file,tinyauth@file"
      traefik.http.routers.seerr.rule: "Host(`se.${domain:?}`)"
      traefik.http.services.seerr.loadbalancer.server.url: "http://seerr:5055"
    networks:
      proxy: null
    volumes:
      - ${data:-.}/seerr:/app/config/:rw
networks:
  default: null
  proxy:
    external: true
services:
  paperlessngx:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: paperlessngx
    environment:
      PAPERLESS_DBHOST: paperlessngx_db
      PAPERLESS_DBNAME: ${db_name:-paperless}
      PAPERLESS_DBPASS: ${db_pass:?}
      PAPERLESS_DBUSER: ${db_user:-paperless}
      PAPERLESS_REDIS: redis://paperlessngx_valkey:6379
      PAPERLESS_SECRET_KEY: ${secret_key:?}
      PAPERLESS_TIME_ZONE: ${timezone:-UTC}
      PAPERLESS_URL: https://pl.${domain:?}
      USERMAP_GID: ${gid:-1000}
      USERMAP_UID: ${uid:-1000}
      PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: '{"openid_connect":{"SCOPE":["openid","profile","email"],"OAUTH_PKCE_ENABLED":true,"APPS":[{"provider_id":"pocket-id","name":"Pocket-ID","client_id":"${client_id:?}","secret":"${client_secret:?}","settings":{"server_url":"https://id.${domain:?}"}}]}}'
    depends_on:
      - paperlessngx_db
      - paperlessngx_valkey
    image: ghcr.io/paperless-ngx/paperless-ngx:${paperlessngx_version:-latest}
    labels:
      homepage.group: Personal
      homepage.href: https://pl.${domain:?}
      homepage.icon: sh-paperless-ngx.svg
      homepage.name: Paperless
      kuma.__docker:
      release_notes: "https://github.com/paperless-ngx/paperless-ngx/releases"
      traefik.enable: "true"
      traefik.http.routers.paperlessngx.entryPoints: "https"
      traefik.http.routers.paperlessngx.middlewares: "allowedIPs@file,tinyauth@file"
      traefik.http.routers.paperlessngx.rule: "Host(`pl.${domain:?}`)"
      traefik.http.services.paperlessngx.loadbalancer.server.url: "http://paperlessngx:8000"
    networks:
      proxy: null
      default: null
    volumes:
      - ${data:-.}/app/data:/usr/src/paperless/data
      - ${data:-.}/app/media:/usr/src/paperless/media
      - ${data:-.}/app/export:/usr/src/paperless/export
      - ${data:-.}/app/consume:/usr/src/paperless/consume
  paperlessngx_db:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    container_name: paperlessngx_db
    environment:
      POSTGRES_DB: ${db_name:-paperless}
      POSTGRES_PASSWORD: ${db_pass:?}
      POSTGRES_USER: ${db_user:-paperless}
    image: docker.io/library/postgres:${postgres_version:-16}
    labels:
      kuma.__docker:
      release_notes: "https://www.postgresql.org/docs/release/"
    networks:
      default: null
    volumes:
      - ${data:-.}/db:/var/lib/postgresql/data
  paperlessngx_valkey:
    extends:
      file: ../common.yaml
      service: base
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: paperlessngx_valkey
    image: valkey/valkey:${valkey_version:-9}
    labels:
      kuma.__docker:
      release_notes: "https://github.com/valkey-io/valkey/releases"
    networks:
      default: null
    volumes:
      - ${data:-.}/valkey:/data

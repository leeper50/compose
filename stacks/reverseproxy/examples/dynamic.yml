allowedIPs: &allowedIPs
  sourceRange:
    - "10.0.0.0/8"
    - "192.168.0.0/16"
    - "172.16.0.0/12"
    - "1.1.1.1/32"
localIPs: &localIPs
  sourceRange:
    - "10.0.0.0/8"
    - "192.168.0.0/16"
    - "172.16.0.0/12"
http:
  middlewares:
    allowedIPs:
      ipAllowList:
        <<: *allowedIPs
    localonly:
      ipAllowList:
        <<: *localIPs
    tinyauth:
      forwardAuth:
        address: http://tinyauth:3000/api/auth/traefik
        authResponseHeaders: remote-user
        maxResponseBodySize: 104857600
tcp:
  middlewares:
    allowedIPs:
      ipAllowList:
        <<: *allowedIPs
    localonly:
      ipAllowList:
        <<: *localIPs

networks:
  send: null
  proxy:
    external: true
x-common-settings: &common-settings
  logging:
    driver: local
    options:
      compress: "true"
      max-file: "3"
      max-size: "10m"
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  stdin_open: false
  tty: false
services:
  convertx:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: convertx
    environment:
      HIDE_HISTORY: true
      JWT_SECRET: ${convertx_jwt:?}
    image: ghcr.io/c4illin/convertx:${convertx_version:-latest}
    labels:
      homepage.group: Tools
      homepage.href: https://cx.${domain:?}
      homepage.icon: sh-convertx.webp
      homepage.name: ConvertX
      kuma.__docker:
      # kuma.__web: '"cx.${domain:?}"'
      release_notes: "https://github.com/C4illin/ConvertX/releases"
      traefik.enable: "true"
      traefik.http.routers.convertx.entryPoints: "https"
      traefik.http.routers.convertx.middlewares: "localonly@file"
      traefik.http.routers.convertx.rule: "Host(`cx.${domain:?}`)"
      traefik.http.services.convertx.loadbalancer.server.url: "http://convertx:3000"
    networks:
      proxy: null
    volumes:
      - ${data:-.}/convertx:/app/data
  ittools:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: ittools
    image: "sharevb/it-tools:${ittools_version:-latest}"
    labels:
      homepage.group: Development
      homepage.href: https://it.${domain:?}
      homepage.icon: sh-it-tools.svg
      homepage.name: ItTools
      kuma.__docker:
      # kuma.__web: '"it.${domain:?}"'
      release_notes: "https://github.com/CorentinTh/it-tools/releases"
      traefik.enable: "true"
      traefik.http.routers.ittools.entryPoints: "https"
      traefik.http.routers.ittools.middlewares: "allowedIPs@file"
      traefik.http.routers.ittools.rule: "Host(`it.${domain:?}`)"
      traefik.http.services.ittools.loadbalancer.server.url: "http://ittools:8080"
    networks:
      proxy: null
  libretranslate:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: libretranslate
    image: libretranslate/libretranslate:${libretranslate_version:-latest}
    labels:
      homepage.group: Utils
      homepage.href: https://lt.${domain:?}
      homepage.icon: sh-libretranslate.svg
      homepage.name: Libretranslate
      kuma.__docker:
      # kuma.__web: '"lt.${domain:?}"'
      release_notes: "https://github.com/LibreTranslate/LibreTranslate/releases"
      traefik.enable: "true"
      traefik.http.routers.libretranslate.entryPoints: "https"
      traefik.http.routers.libretranslate.middlewares: "allowedIPs@file"
      traefik.http.routers.libretranslate.rule: "Host(`lt.${domain:?}`)"
      traefik.http.services.libretranslate.loadbalancer.server.url: "http://libretranslate:5000"
    networks:
      proxy: null
  speedtest:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: speedtest
    image: germannewsmaker/myspeed:${myspeed_version:-latest}
    labels:
      homepage.group: Monitoring & Metrics
      homepage.href: https://sp.${domain:?}
      homepage.icon: sh-librespeed.svg
      homepage.name: MySpeed
      kuma.__docker:
      # kuma.__web: '"sp.${domain:?}"'
      release_notes: "https://github.com/gnmyt/MySpeed/releases"
      traefik.enable: "true"
      traefik.http.routers.speedtest.entryPoints: "https"
      traefik.http.routers.speedtest.middlewares: "localonly@file"
      traefik.http.routers.speedtest.rule: "Host(`sp.${domain:?}`)"
      traefik.http.services.speedtest.loadbalancer.server.url: "http://speedtest:5216"
    networks:
      proxy: null
    volumes:
      - "${data:-.}/speedtest:/myspeed/data"
  privatebin:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: privatebin
    image: privatebin/nginx-fpm-alpine:${privatebin_version:-stable}
    labels:
      homepage.group: Files & Sharing
      homepage.href: https://pb.${domain:?}
      homepage.icon: sh-privatebin.svg
      homepage.name: PrivateBin
      kuma.__docker:
      # kuma.__web: '"pb.${domain:?}"'
      release_notes: "https://privatebin.info/tag/release.html"
      traefik.enable: "true"
      traefik.http.routers.privatebin.entryPoints: "https"
      traefik.http.routers.privatebin.middlewares: "allowedIPs@file"
      traefik.http.routers.privatebin.rule: "Host(`pb.${domain:?}`)"
      traefik.http.services.privatebin.loadbalancer.server.url: "http://privatebin:8080"
    networks:
      proxy: null
    read_only: true
    user: ${uid:-1000}:${gid:-1000}
    volumes:
      - ${data:-.}/privatebin/data:/srv/data
      - ${data:-.}/privatebin/tmp:/tmp
      - ${data:-.}/privatebin/run:/run
      - ${data:-.}/privatebin/nginx:/var/lib/nginx/tmp
  send:
    <<: *common-settings
    cap_drop:
      - ALL
    container_name: send
    depends_on:
      - send_valkey
    environment:
      BASE_URL: https://send.${domain:?}
      DEFAULT_EXPIRE_SECONDS: 3600
      DOWNLOAD_COUNTS: 1,2,5
      EXPIRE_TIMES_SECONDS: 3600,86400,604800,2592000,31536000
      MAX_DOWNLOADS: 5
      MAX_EXPIRE_SECONDS: 31536000
      MAX_FILE_SIZE: 10737418240
      NODE_ENV: production
      REDIS_HOST: send_valkey
    image: registry.gitlab.com/timvisee/send:${send_version:-latest}
    labels:
      homepage.group: Files & Sharing
      homepage.href: https://send.${domain:?}
      homepage.icon: sh-send-visee.svg
      homepage.name: Send
      kuma.__docker:
      # kuma.__web: '"send.${domain:?}"'
      release_notes: "https://gitlab.com/timvisee/send-instances/-/blob/master/README.md"
      traefik.enable: "true"
      traefik.http.routers.send.entryPoints: "https"
      traefik.http.routers.send.middlewares: "allowedIPs@file"
      traefik.http.routers.send.rule: "Host(`send.${domain:?}`)"
      traefik.http.services.send.loadbalancer.server.url: "http://send:1443"
    networks:
      proxy:
      send: null
    volumes:
      - ${data:-.}/send/app:/uploads
  send_valkey:
    <<: *common-settings
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    container_name: send_valkey
    image: valkey/valkey:${valkey_version:-9}
    labels:
      kuma.__docker:
      release_notes: "https://github.com/valkey-io/valkey/releases"
    networks:
      send: null
    volumes:
      - ${data:-.}/send/valkey:/data
  slink:
    <<: *common-settings
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - CHOWN
    #   - SETGID
    #   - SETUID
    container_name: slink
    environment:
      IMAGE_COMPRESSION_QUALITY: 100
      IMAGE_MAX_SIZE: 50M
      IMAGE_STRIP_EXIF_METADATA: true
      ORIGIN: https://sl.${domain:?}
      REQUIRE_SSL: true
      STORAGE_PROVIDER: local
      TZ: ${timezone:-UTC}
      USER_APPROVAL_REQUIRED: true
      USER_PASSWORD_MIN_LENGTH: 8
      USER_PASSWORD_REQUIREMENTS: 15 # bitmask of requirements
    image: anirdev/slink:${slink_version:-latest}
    labels:
      homepage.group: Files & Sharing
      homepage.href: https://sl.${domain:?}
      homepage.icon: sh-slink.webp
      homepage.name: Slink
      kuma.__docker:
      # kuma.__web: '"sl.${domain:?}"'
      release_notes: "https://github.com/andrii-kryvoviaz/slink/releases"
      traefik.enable: "true"
      traefik.http.routers.slink.entryPoints: "https"
      traefik.http.routers.slink.middlewares: "allowedIPs@file"
      traefik.http.routers.slink.priority: 30
      traefik.http.routers.slink.rule: "Host(`sl.${domain:?}`)"
      traefik.http.services.slink.loadbalancer.server.url: "http://slink:3000"
      # No middleware for outbound images
      traefik.http.routers.slink-images.entrypoints: "https"
      traefik.http.routers.slink-images.priority: 50
      traefik.http.routers.slink-images.rule: "Host(`sl.${domain:?}`) && PathPrefix(`/image/`)"
    networks:
      proxy: null
    user: ${uid:-1000}:${gid:-1000}
    volumes:
      - ${data:-.}/slink/db:/app/var/data
      - ${data:-.}/slink/images:/app/slink/images
